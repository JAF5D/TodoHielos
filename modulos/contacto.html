<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto</title>
    <link rel="stylesheet" href="../css/estilos.css?v=cubos-jpeg-1" />
    <link rel="stylesheet" href="../css/contacto.css?v=cubos-jpeg-1" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"

    />
  </head>
  <body>
    <div data-shared-header></div>
    <main>
      <!-- En esta seccion mostramos los datos principales de contacto para que sean faciles de localizar. -->
      <section class="section-wrap">
        <div class="contact-card">
          <h2 class="section-title">Datos de la empresa.</h2>
          <ul>
            <li class="contact-item">
              Direccion: Calle Simpecado 3, Macarena, Sevilla
            </li>
            <li class="contact-item">Numero de Telefono: +34 62483767</li>
            <li class="contact-item">Email: Todo_HielosEM@gmail.com</li>
          </ul>
        </div>
      </section>
      <div class="map-box">
        <h2 class="map-title">Encuentranos</h2>
        <iframe
          class="map-frame"
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3169.2111324203875!2d-5.985264924667838!3d37.40848423317621!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd1269561af3a875%3A0x8ab446f837c6cc94!2sC.%20Simpecado%2C%203%2C%2041009%20Sevilla!5e0!3m2!1ses!2ses!4v1741321836326!5m2!1ses!2ses"
          width="600"
          height="450"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </div>
    </main>
    <div data-shared-footer></div>
    <!-- Este script inserta el header y el footer compartidos para mantener la misma estructura en todo el sitio. -->
    <script src="../js/layout.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

</html>
