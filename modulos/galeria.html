<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeria</title>
    <link rel="stylesheet" href="../css/estilos.css?v=cubos-jpeg-1" />
    <link rel="stylesheet" href="../css/galeria.css?v=cubos-jpeg-1" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div data-shared-header></div>
    <main>
      <!-- Aqui se muestra la galeria en forma de mosaico y cada imagen puede abrirse en el visor ampliado. -->
      <section id="galeria">
        <img
          class="gallery-item"
          src="../assets/images/arpa.jpg"
          alt="escultura de arpa"
          loading="lazy"
        />
        <img
          class="gallery-item"
          src="../assets/images/cisne.jpg"
          alt="escultura de cisne"
          loading="lazy"
        />
        <img
          class="gallery-item"
          src="../assets/images/guitarra.jpg"
          alt="escultura de guitarra"
          loading="lazy"
        />
        <img
          class="gallery-item"
          src="../assets/images/pareja.jpg"
          alt="escultura de pareja"
          loading="lazy"
        />
        <img
          class="gallery-item"
          src="../assets/images/reno.jpg"
          alt="escultura de reno"
          loading="lazy"
        />
        <img
          class="gallery-item"
          src="../assets/images/aquario.jpg"
          alt="escultura de capricornio"
          loading="lazy"
        />
        <img
          class="gallery-item"
          src="../assets/images/flamenco.jpg"
          alt="escultura de flamenco"
          loading="lazy"
        />
        <img
          class="gallery-item"
          src="../assets/images/voladores.jpg"
          alt="escultura de peces voladores"
          loading="lazy"
        />
        <img
          class="gallery-item"
          src="../assets/images/sirena.jpg"
          alt="escultura de sirena"
          loading="lazy"
        />
        <img
          class="gallery-item"
          src="../assets/images/pez.jpg"
          alt="escultura de pez espada"
          loading="lazy"
        />
        <img
          class="gallery-item"
          src="../assets/images/perro.jpg"
          alt="escultura de perro"
          loading="lazy"
        />
        <img
          class="gallery-item"
          src="../assets/images/balet.jpg"
          alt="escultura de balet"
          loading="lazy"
        />
        <img
          class="gallery-item"
          src="../assets/images/grifo.jpg"
          alt="escultura de grifo"
          loading="lazy"
        />
        <img
          class="gallery-item"
          src="../assets/images/pavo.jpg"
          alt="escultura de pavo"
          loading="lazy"
        />
        <img
          class="gallery-item"
          src="../assets/images/cupido.jpg"
          alt="escultura de cupido"
          loading="lazy"
        />
        <img
          class="gallery-item"
          src="../assets/images/dragon.jpg"
          alt="escultura de dragon"
          loading="lazy"
        />
      </section>
      <!-- Este bloque actua como visor ampliado y permite recorrer las imagenes sin salir de la pagina. -->
      <section id="contenedor-principal">
        <div id="contenedor-interno">
          <img id="img-activa" src="../assets/images/arpa.jpg" alt="avatar" />
          <button id="btn-cierra" type="button">&times;</button>
          <button id="btn-retrocede" type="button">&lt;</button>
          <button id="btn-adelante" type="button">&gt;</button>
        </div>
      </section>
    </main>
    <div data-shared-footer></div>
    <!-- Cargamos primero la estructura comun del sitio y despues la logica propia del visor de imagenes. -->
    <script src="../js/layout.js"></script>
    <script src="../js/galeria.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
