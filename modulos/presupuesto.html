<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presupuesto</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/estilos.css" />
    <link rel="stylesheet" href="../css/presupuesto.css" />
  </head>
  <body>
    <div data-shared-header></div>
    <main>
      <!-- Este formulario recoge los datos del usuario, calcula el presupuesto y valida la informacion antes de enviarla. -->
      <form id="form-presupuesto">
        <fieldset>
          <!-- En este primer bloque pedimos los datos personales necesarios para poder contactar con el cliente. -->
          <legend>Datos de Contacto</legend>
          <label for="nombre">Nombre (solo letras, max 15):</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            maxlength="15"
            inputmode="text"
            autocomplete="given-name"
            required
          />
          <span class="field-error" id="error-nombre"></span>

          <label for="apellidos">Apellidos (solo letras, max 40):</label>
          <input
            type="text"
            id="apellidos"
            name="apellidos"
            maxlength="40"
            inputmode="text"
            autocomplete="family-name"
            required
          />
          <span class="field-error" id="error-apellidos"></span>

          <label for="telefono">Telefono (solo numeros, max 9):</label>
          <input
            type="text"
            id="telefono"
            name="telefono"
            maxlength="9"
            inputmode="numeric"
            autocomplete="tel"
            required
          />
          <span class="field-error" id="error-telefono"></span>

          <label for="email">Correo Electronico:</label>
          <input type="email" id="email" name="email" required />
          <span class="field-error" id="error-email"></span>
        </fieldset>

        <fieldset>
          <!-- Aqui se eligen las opciones que influyen directamente en el precio final del presupuesto. -->
          <legend>Presupuesto</legend>
          <label for="producto">Producto:</label>
          <select id="producto" name="producto" required>
            <option value="">Selecciona un producto</option>
            <option value="100">Escultura de Arpa - 100 EUR</option>
            <option value="120">Escultura de Cisne - 120 EUR</option>
            <option value="140">Escultura de Guitarra - 140 EUR</option>
            <option value="160">Escultura de Pareja - 160 EUR</option>
            <option value="180">Escultura de Reno - 180 EUR</option>
            <option value="200">Escultura de Capricornio - 200 EUR</option>
            <option value="220">Escultura de Flamenco - 220 EUR</option>
            <option value="240">Escultura de Peces Voladores - 240 EUR</option>
            <option value="260">Escultura de Sirena - 260 EUR</option>
            <option value="280">Escultura de Pez Espada - 280 EUR</option>
            <option value="300">Escultura de Perro - 300 EUR</option>
            <option value="320">Escultura de Balet - 320 EUR</option>
            <option value="340">Escultura de Grifo - 340 EUR</option>
            <option value="360">Escultura de Pavo - 360 EUR</option>
            <option value="380">Escultura de Cupido - 380 EUR</option>
            <option value="400">Escultura de Dragon - 400 EUR</option>
          </select>

          <label for="plazo">Plazo meses:</label>
          <input type="number" id="plazo" name="plazo" min="1" required />

          <label>Extras:</label>
          <!-- Este contenedor agrupa los extras para que queden alineados y sean mas faciles de leer y seleccionar. -->
          <div class="extras-list">
            <label class="extra-row" for="extra1">
              <input type="checkbox" id="extra1" name="extras" value="50" />
              Bolsa de cubos de hielo premium (+50 EUR)
            </label>
            <label class="extra-row" for="extra2">
              <input type="checkbox" id="extra2" name="extras" value="30" />
              Bolsa de cubos de hielo normal (+30 EUR)
            </label>
            <label class="extra-row" for="extra3">
              <input type="checkbox" id="extra3" name="extras" value="20" />
              Bolsa de hielo picado (+20 EUR)
            </label>
          </div>

          <label>Presupuesto Total:</label>
          <div id="presupuesto-total">0 EUR</div>

          <label>
            <input type="checkbox" id="condiciones" name="condiciones" required />
            Acepto las condiciones de privacidad
          </label>
          <span class="field-error" id="error-condiciones"></span>
        </fieldset>

        <button type="submit">Enviar Presupuesto</button>
        <button type="reset">Resetear Formulario</button>
      </form>
    </main>
    <div data-shared-footer></div>
    <!-- Primero cargamos la estructura comun del sitio y despues la logica especifica de este formulario. -->
    <script src="../js/layout.js"></script>
    <script src="../js/presupuesto.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
